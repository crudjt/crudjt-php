name: Run PHP test on multiple OS and architectures

on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        include:
          # - os: macos-latest
          #   arch: aarch64
          # - os: windows-latest
          #   arch: x86_64
          - os: ubuntu-latest
            arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          extensions: mbstring, json, ffi, msgpack
          tools: composer

      - name: Enable JIT
        run: echo "opcache.jit=1235" >> $GITHUB_ENV

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress

      - name: Run test
        run: php test.php
